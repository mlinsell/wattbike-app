<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wattbike Tracker</title>
  <link rel="manifest" href="./manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --surface-border: #374151;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --danger: #ef4444;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Layout */
    .app-container { max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Header & Tabs */
    .header { padding: 16px 20px 0; border-bottom: 1px solid var(--surface-border); background: var(--bg); z-index: 10; }
    .tabs { display: flex; position: relative; margin-top: 16px; }
    .tab-btn { flex: 1; padding: 12px 0; text-align: center; color: var(--text-muted); font-weight: 500; font-size: 14px; cursor: pointer; transition: color 0.3s; }
    .tab-btn.active { color: var(--text); }
    .tab-indicator { position: absolute; bottom: 0; left: 0; height: 2px; width: 33.33%; background: var(--accent); transition: transform 0.3s ease; }

    /* Slider / Pages */
    .viewport { flex: 1; overflow: hidden; position: relative; }
    .pages-slider { display: flex; height: 100%; width: 300%; transition: transform 0.3s ease; }
    .pages-slider.p1 { transform: translateX(0); }
    .pages-slider.p2 { transform: translateX(-33.333%); }
    .pages-slider.p3 { transform: translateX(-66.666%); }
    .page { width: 33.333%; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 80px; }

    /* Cards & Form Elements */
    .card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .card-title { font-size: 12px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; letter-spacing: 0.5px; }
    
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .input-group input, .input-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--surface-border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 14px; }
    .input-group textarea { resize: vertical; min-height: 80px; }
    .input-group input:focus, .input-group textarea:focus { outline: none; border-color: var(--accent); }

    /* Metrics Grid */
    .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .metric-box { background: var(--surface); border: 1px solid var(--surface-border); padding: 16px; border-radius: 12px; text-align: center; }
    .metric-val { font-size: 24px; font-weight: 700; color: var(--text); margin-top: 4px; }
    .metric-lbl { font-size: 12px; color: var(--text-muted); }

    /* Buttons */
    .btn { display: block; width: 100%; background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 16px; text-align: center; cursor: pointer; transition: background 0.2s; }
    .btn:active { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    /* Upcoming List */
    .up-card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .up-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .up-day { font-weight: 600; font-size: 16px; color: var(--text); }
    .up-date { font-size: 12px; color: var(--text-muted); }
    .up-pill { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; font-size: 11px; padding: 4px 8px; border-radius: 12px; font-weight: 600; }
    .up-goal { font-size: 14px; margin-bottom: 12px; color: var(--text); }
    .up-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .chip { background: var(--bg); border: 1px solid var(--surface-border); border-radius: 6px; padding: 4px 8px; display: flex; gap: 6px; align-items: center; }
    .chip-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
    .chip-val { font-size: 12px; font-weight: 600; color: var(--text); }
    .up-int { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* Analytics Styles */
    .sec-title { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--text); }
    .sec-sub { font-size: 12px; font-weight: 400; color: var(--text-muted); display: block; margin-top: 2px; }
    
    .pb-card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; padding: 16px; overflow-x: auto; }
    .pb-table { width: 100%; text-align: left; border-collapse: collapse; font-size: 12px; }
    .pb-table th { color: var(--text-muted); font-weight: 500; padding-bottom: 8px; border-bottom: 1px solid var(--surface-border); }
    .pb-table td { padding: 12px 0; border-bottom: 1px solid var(--surface-border); color: var(--text); }
    .pb-table tr:last-child td { border-bottom: none; padding-bottom: 0; }
    .pb-num { font-weight: 600; color: var(--accent); }

    .chart-card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 220px; width: 100%; }

    .heatmap-card { background: var(--surface); border: 1px solid var(--surface-border); border-radius: 12px; padding: 16px; }
    .hm-legend { display: flex; font-size: 10px; color: var(--text-muted); margin-top: 12px; }
    .hm-cell { width: 10px; height: 10px; border-radius: 2px; }

    /* Utility */
    .no-data { text-align: center; color: var(--text-muted); font-size: 14px; margin-top: 40px; }
    .toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 24px; border-radius: 30px; font-weight: 500; font-size: 14px; transition: bottom 0.3s ease; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    .toast.error { background: var(--danger); }
    .toast.show { bottom: 30px; }
    
    /* Loading/Error Screens */
    #loadingScreen, #errorScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); text-align: center; padding: 20px; }
    #appShell { display: none; flex-direction: column; height: 100vh; }
  </style>
</head>
<body>

  <div id="loadingScreen">
    <div style="color: var(--text-muted); margin-bottom: 16px;">Authenticating & Loading...</div>
  </div>

  <div id="errorScreen" style="display: none;">
    <h2 style="color: var(--danger); margin-bottom: 12px;" id="errorTitle">Error</h2>
    <p id="errorMsg" style="color: var(--text-muted); font-size: 14px;"></p>
    <button class="btn" style="margin-top: 24px; max-width: 200px;" onclick="location.reload()">Retry</button>
  </div>

  <div id="appShell">
    <div class="header">
      <h2 style="font-size: 20px;">Wattbike Hub</h2>
      <div class="tabs">
        <div id="tab1" class="tab-btn active" onclick="switchPage(1)">Today</div>
        <div id="tab2" class="tab-btn" onclick="switchPage(2)">Upcoming</div>
        <div id="tab3" class="tab-btn" onclick="switchPage(3)">Analysis</div>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>
    </div>

    <div class="viewport">
      <div id="slider" class="pages-slider p1">
        
        <div class="page" id="page1">
          <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;">
            <h1 id="dayName" style="font-size: 24px; font-weight: 700;">—</h1>
            <span id="dateDisplay" style="color: var(--text-muted); font-size: 14px;">—</span>
          </div>

          <div class="metrics-grid">
            <div class="metric-box">
              <div class="metric-lbl">Avg Power</div>
              <div class="metric-val" id="mWatts">—</div>
            </div>
            <div class="metric-box">
              <div class="metric-lbl">Work Done</div>
              <div class="metric-val" id="mKJ">—</div>
            </div>
            <div class="metric-box">
              <div class="metric-lbl">Avg HR</div>
              <div class="metric-val" id="mHR">—</div>
            </div>
            <div class="metric-box">
              <div class="metric-lbl">Avg RPM</div>
              <div class="metric-val" id="mRPM">—</div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">Session Details</div>
            <div class="input-group">
              <label>Goal</label>
              <input type="text" id="goalInput" placeholder="e.g. Base Endurance">
            </div>
            <div style="display: flex; gap: 12px;">
              <div class="input-group" style="flex: 1;">
                <label>Duration</label>
                <input type="text" id="durationInput" placeholder="45 mins">
              </div>
              <div class="input-group" style="flex: 1;">
                <label>HR Cap</label>
                <input type="text" id="hrCapInput" placeholder="140 bpm">
              </div>
            </div>
            <div class="input-group">
              <label>Intensity target</label>
              <input type="text" id="intensityInput" placeholder="Z2 / Easy">
            </div>
            <div class="input-group">
              <label>Notes</label>
              <textarea id="notesInput" placeholder="How did it feel?"></textarea>
            </div>
            <button id="saveBtn" class="btn" onclick="saveWorkout()" style="margin-top: 8px;">Save Changes</button>
          </div>
        </div>

        <div class="page" id="page2">
          <div id="upcomingList">
            <div class="no-data">Loading upcoming...</div>
          </div>
        </div>

        <div class="page" id="page3">
          <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;">
            <div style="font-weight: 600; font-size: 18px;" id="rideCount">— rides</div>
          </div>
          <div style="color: var(--text-muted); font-size: 12px; margin-bottom: 16px;" id="analysisRange">—</div>
          
          <div id="analysisContent">
            <div class="no-data">Loading analysis...</div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // --- OFFLINE SYNC API CONFIGURATION ---
    const API_URL = "https://script.google.com/macros/s/AKfycbyYB5tIIt046ejx-7AX804Zdox2uN2aJqvnboPIFMB5RWgAMJag7pZL-0h6lJkpLe9oOg/exec";

    let apiToken = localStorage.getItem('wb_token');
    if (!apiToken) {
      apiToken = prompt("Enter your Wattbike App passcode:");
      if (apiToken) {
        localStorage.setItem('wb_token', apiToken);
      } else {
        alert("Passcode required to sync data.");
      }
    }

    const AUTH_URL = API_URL + "?token=" + encodeURIComponent(apiToken);

    var currentRow = null;
    var currentPage = 1;
    var offlineQueue = JSON.parse(localStorage.getItem('wb_syncQueue') || '[]');

    window.addEventListener('load', function() {
      registerServiceWorker();
      
      const cachedData = localStorage.getItem('wb_data');
      if (cachedData) {
        renderAll(JSON.parse(cachedData));
      } else {
        var el = document.getElementById('analysisContent');
        if(el) el.innerHTML = '<div class="no-data">Syncing initial data...</div>';
      }

      if (navigator.onLine && apiToken) {
        syncApp();
      } else {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('appShell').style.display = 'flex';
      }
    });

    window.addEventListener('online', syncApp);

    async function syncApp() {
      if (offlineQueue.length > 0) {
        try {
          const res = await fetch(AUTH_URL, {
            method: 'POST',
            body: JSON.stringify(offlineQueue)
          });
          const result = await res.json();
          if (result.success) {
            offlineQueue = [];
            localStorage.setItem('wb_syncQueue', '[]');
            showToast('Offline saves synced ✓', false);
          } else if (result.error === "Access Denied") {
            handleAuthError();
            return;
          }
        } catch(e) {
          console.log('Failed to push sync queue');
        }
      }

      try {
        const res = await fetch(AUTH_URL);
        const data = await res.json();
        
        if (data.error === "Access Denied") {
          handleAuthError();
          return;
        }

        localStorage.setItem('wb_data', JSON.stringify(data));
        renderAll(data);
      } catch(e) {
        console.log('Offline mode active');
      }
    }

    function handleAuthError() {
      alert("Incorrect passcode. Please refresh and try again.");
      localStorage.removeItem('wb_token');
      location.reload();
    }

    function renderAll(data) {
      if(data.today) handleToday(data.today);
      if(data.upcoming) handleUpcoming(data.upcoming);
      if(data.analytics) renderAnalytics(data.analytics);
    }

    function saveWorkout() {
      if (!currentRow) return;
      var btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Saving…';
      
      const workoutData = {
        rowNum: currentRow,
        goal: document.getElementById('goalInput').value,
        duration: document.getElementById('durationInput').value,
        intensity: document.getElementById('intensityInput').value,
        hrCap: document.getElementById('hrCapInput').value,
        notes: document.getElementById('notesInput').value
      };

      offlineQueue.push(workoutData);
      localStorage.setItem('wb_syncQueue', JSON.stringify(offlineQueue));
      
      btn.disabled = false; 
      btn.textContent = 'Save Changes';
      showToast('Saved locally. Will sync when online.', false);

      if (navigator.onLine) syncApp();
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(function() { console.log('SW registered!'); })
          .catch(function(err) { console.log('SW registration failed', err); });
      }
    }

    function switchPage(n) {
      currentPage = n;
      document.getElementById('slider').className = 'pages-slider p' + n;
      
      [1,2,3].forEach(function(i) {
        document.getElementById('tab'+i).className = 'tab-btn' + (i===n?' active':'');
      });
      
      const indicator = document.getElementById('tabIndicator');
      if(n === 1) indicator.style.transform = 'translateX(0%)';
      if(n === 2) indicator.style.transform = 'translateX(100%)';
      if(n === 3) indicator.style.transform = 'translateX(200%)';
    }

    function handleToday(data) {
      document.getElementById('loadingScreen').style.display = 'none';
      
      if (data.error) {
        document.getElementById('errorScreen').style.display = 'flex';
        document.getElementById('errorMsg').textContent = data.error;
        return;
      }
      
      currentRow = data.rowNum;
      document.getElementById('dayName').textContent    = data.dayOfWeek.toUpperCase();
      document.getElementById('dateDisplay').textContent = data.date;
      document.getElementById('goalInput').value         = data.goal;
      document.getElementById('durationInput').value     = data.duration;
      document.getElementById('hrCapInput').value        = data.hrCap;
      document.getElementById('intensityInput').value    = data.intensity;
      document.getElementById('notesInput').value        = data.notes;
      
      setMetric('mWatts', data.avgWatts);
      setMetric('mHR',    data.avgHR);
      setMetric('mRPM',   data.avgRPM);
      setMetric('mKJ',    data.workKJ);

      document.getElementById('appShell').style.display = 'flex';
    }

    function setMetric(id, val) {
      var el = document.getElementById(id);
      if(!el) return;
      if (val === '' || val === null || val === undefined) {
        el.innerHTML = '<span style="color: var(--text-muted)">—</span>';
      } else {
        el.textContent = val;
      }
    }

    function handleUpcoming(result) {
      var list = document.getElementById('upcomingList');
      if (!result.days || result.days.length === 0) {
        list.innerHTML = '<div class="no-data">No upcoming rides found.</div>';
        return;
      }
      list.innerHTML = result.days.map(function(day) {
        var labels = {1:'Tomorrow',2:'In 2 days',3:'In 3 days'};
        var pill   = labels[day.daysAway] || 'In '+day.daysAway+' days';
        return '<div class="up-card">'+
          '<div class="up-head">'+
            '<div><div class="up-day">'+esc(day.dayOfWeek)+'</div><div class="up-date">'+esc(day.date)+'</div></div>'+
            '<div class="up-pill">'+pill+'</div>'+
          '</div>'+
          '<div class="up-body">'+
            '<div class="up-goal">'+(day.goal?esc(day.goal):'<span style="color:var(--text-muted);font-weight:400">No goal set</span>')+'</div>'+
            '<div class="up-meta">'+chipHtml('Duration',day.duration)+(day.hrCap?chipHtml('HR Cap',day.hrCap):'')+
            (day.avgWatts?chipHtml('Avg W',day.avgWatts):'')+'</div>'+
            (day.intensity?'<div class="up-int">'+esc(day.intensity)+'</div>':'')+
          '</div></div>';
      }).join('');
    }

    function chipHtml(lbl,val) {
      return '<div class="chip"><div class="chip-lbl">'+lbl+'</div><div class="chip-val">'+esc(String(val||'—'))+'</div></div>';
    }

    function renderAnalytics(result) {
      var content = document.getElementById('analysisContent');
      if (!result || result.error) {
        content.innerHTML = '<div class="no-data">' + (result ? result.error : 'No response from server.') + '</div>';
        return;
      }
      if (!result.sessions || result.sessions.length < 2) {
        content.innerHTML = '<div class="no-data">Not enough session data yet.<br>Keep riding — trends appear after a few weeks.</div>';
        return;
      }

      var sessions = result.sessions;
      
      sessions.forEach(function(s) {
        if (!s.durationMins && s.workKJ && s.avgWatts) {
          s.durationMins = s.workKJ / (s.avgWatts * 0.06);
        }
      });

      var n = sessions.length;
      var now = Date.now();
      var ms90 = now - 90*864e5;
      var ms30 = now - 30*864e5;
      var ms7  = now - 7*864e5;

      var currentMonday = getMondayMs(now);
      var minChartAxis = currentMonday - (11 * 7 * 864e5); 
      var maxChartAxis = currentMonday + (7 * 864e5);      

      document.getElementById('rideCount').textContent = n + ' rides';
      var first = new Date(sessions[0].dateMs);
      var last  = new Date(sessions[n-1].dateMs);
      document.getElementById('analysisRange').textContent = fmtShort(first) + ' – ' + fmtShort(last);

      content.innerHTML =
        '<div class="sec-title">Personal Bests</div>'+
        '<div class="pb-card"><table class="pb-table">'+
          '<tr><th></th><th>All time</th><th>90 days</th><th>30 days</th><th>7 days</th></tr>'+
          '<tr><td>Avg power (>30m)</td><td><span class="pb-num" id="pbAvgAll">—</span></td><td><span class="pb-num" id="pbAvg90">—</span></td><td><span class="pb-num" id="pbAvg30">—</span></td><td><span class="pb-num" id="pbAvg7">—</span></td></tr>'+
          '<tr><td>Max Weekly Load</td><td><span class="pb-num" id="pbKjAll">—</span></td><td><span class="pb-num" id="pbKj90">—</span></td><td><span class="pb-num" id="pbKj30">—</span></td><td><span class="pb-num" id="pbKj7">—</span></td></tr>'+
        '</table></div>'+
        
        '<div><div class="sec-title">Efficiency Factor (EF) <span class="sec-sub">Watts per heartbeat · last 12 weeks</span></div>'+
        '<div class="chart-card"><div class="chart-wrap"><canvas id="effCanvas"></canvas></div></div></div>'+
        
        '<div><div class="sec-title">Weekly Load <span class="sec-sub">hrs vs kJ · last 12 weeks</span></div>'+
        '<div class="chart-card"><div class="chart-wrap"><canvas id="volCanvas"></canvas></div></div></div>'+
        
        '<div><div class="sec-title">Monthly Load <span class="sec-sub">last 12 months (hrs vs kJ)</span></div>'+
        '<div class="chart-card"><div class="chart-wrap"><canvas id="monthlyCanvas"></canvas></div></div></div>'+
        
        '<div><div class="sec-title">Monthly Avg Power <span class="sec-sub">weighted avg (watts)</span></div>'+
        '<div class="chart-card"><div class="chart-wrap"><canvas id="monthlyPwrCanvas"></canvas></div></div></div>'+
        
        '<div><div class="sec-title">Ride Consistency <span class="sec-sub">work done (kJ) last 26 weeks</span></div>'+
        '<div class="heatmap-card" id="heatmap"></div></div>';

      // PB filter - Avg Power for rides strictly > 30 mins
      var avgSessions  = sessions.filter(function(s){return s.avgWatts>0 && s.durationMins > 30});
      setPB('pbAvgAll',  maxOf(avgSessions,'avgWatts'),'w');
      setPB('pbAvg90',   maxOf(avgSessions.filter(function(s){return s.dateMs>=ms90}),'avgWatts'),'w');
      setPB('pbAvg30',   maxOf(avgSessions.filter(function(s){return s.dateMs>=ms30}),'avgWatts'),'w');
      setPB('pbAvg7',    maxOf(avgSessions.filter(function(s){return s.dateMs>=ms7}), 'avgWatts'),'w');

      // PB filter - Max Weekly Load
      var weekMapPB = {};
      sessions.forEach(function(s){
        var mon = getMondayMs(s.dateMs);
        if(!weekMapPB[mon]) weekMapPB[mon] = {ms: mon, kj: 0};
        weekMapPB[mon].kj += s.workKJ || 0;
      });
      var pbWeeks = Object.values(weekMapPB);
      
      setPB('pbKjAll', maxOf(pbWeeks, 'kj'), ' kJ');
      setPB('pbKj90',  maxOf(pbWeeks.filter(function(w){return w.ms>=ms90}), 'kj'), ' kJ');
      setPB('pbKj30',  maxOf(pbWeeks.filter(function(w){return w.ms>=ms30}), 'kj'), ' kJ');
      
      var rolling7DayKj = sessions.filter(function(s){return s.dateMs >= ms7}).reduce(function(acc, s){return acc + (s.workKJ || 0);}, 0);
      setPB('pbKj7', rolling7DayKj, ' kJ');

      // Efficiency Factor Chart
      var efSessions = sessions.filter(function(s){return s.avgWatts>0 && s.avgHR>0}).map(function(s){return {dateMs: s.dateMs, ef: s.avgWatts / s.avgHR}});
      var effPts  = efSessions.map(function(s){return{x:s.dateMs,y:+(s.ef).toFixed(3)}});
      var roll28  = effPts.map(function(pt){
        var cutoff=pt.x-28*864e5;
        var win=effPts.filter(function(p){return p.x>=cutoff&&p.x<=pt.x});
        return{x:pt.x,y:+(win.reduce(function(a,b){return a+b.y},0)/win.length).toFixed(3)};
      });

      new Chart(document.getElementById('effCanvas'),{
        type:'scatter',
        data:{datasets:[
          {type:'scatter',data:effPts,backgroundColor:'rgba(139,92,246,0.3)',pointRadius:3,pointHoverRadius:5},
          {type:'line',data:roll28,borderColor:'#8b5cf6',borderWidth:2,pointRadius:0,fill:false,tension:.35}
        ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
          scales:{
            x:{
              type:'linear', min: minChartAxis, max: maxChartAxis, grid:{display: false},
