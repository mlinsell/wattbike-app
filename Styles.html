<style>
  :root {
    --bg:#f5f5f7; --surface:#fff; --border:#e4e4e7; --focus:#3b82f6;
    --accent:#2563eb; --accent-soft:#eff6ff;
    --text:#111827; --t2:#6b7280; --t3:#9ca3af;
    --watts:#ea580c; --hr:#dc2626; --rpm:#16a34a; --kj:#8b5cf6;
    --locked:#f9fafb; --radius:12px;
    --sans:'DM Sans',system-ui,sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
  body{display:flex;flex-direction:column;min-height:100dvh}

  .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .tab-btn{flex:1;padding:11px 4px 9px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

  .pages-wrap{flex:1;overflow:hidden;position:relative}
  .pages-slider{display:flex;height:100%;width:300%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .pages-slider.p1{transform:translateX(0)}
  .pages-slider.p2{transform:translateX(-33.333%)}
  .pages-slider.p3{transform:translateX(-66.667%)}
  .page{width:33.333%;height:100%;display:flex;flex-direction:column;overflow:hidden}

  .hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .hdr-day{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .hdr-date{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text);line-height:1}
  .hdr-sub{font-size:13px;font-weight:500;color:var(--t2);margin-top:2px}
  .badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}

  .fields{flex:1;overflow-y:auto;padding:11px 12px 0;display:flex;flex-direction:column;gap:9px}
  .flbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:3px}
  .finput{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:16px;font-weight:500;padding:10px 12px;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;white-space:pre-wrap;word-break:break-word}
  .finput:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .finput::placeholder{color:var(--t3);font-weight:400}
  .goal-f{font-size:17px;font-weight:700}
  .fg{display:flex;flex-direction:column}
  .fg.grow{flex:1;min-height:0;display:flex;flex-direction:column}
  .fg.grow .finput{flex:1;min-height:80px;font-size:13px;font-weight:400;color:#374151;line-height:1.5;resize:none}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .div-line{height:1px;background:var(--border);flex-shrink:0}

  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:9px 12px 0;flex-shrink:0}
  .mbox{background:var(--locked);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 8px 12px;text-align:center}
  .mval{font-family:var(--mono);font-size:16px;font-weight:500;line-height:1;margin-bottom:4px}
  .mval.w{color:var(--watts)}.mval.h{color:var(--hr)}.mval.r{color:var(--rpm)}.mval.k{color:var(--kj)}.mval.empty{color:var(--t3)}
  .mlbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}
  .mauto{font-size:7px;color:var(--t3);margin-top:2px}

  .notes{padding:8px 12px 0;flex-shrink:0}
  .nbox{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:15px;padding:10px 12px;outline:none;resize:none;height:74px;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;line-height:1.5;white-space:pre-wrap;word-break:break-word}
  .nbox:focus{border-color:var(--focus);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  .nbox::placeholder{color:var(--t3)}
  .footer{padding:9px 12px 18px;flex-shrink:0}
  .save-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:.04em;padding:14px;cursor:pointer;transition:opacity .15s,transform .1s;-webkit-appearance:none}
  .save-btn:active{transform:scale(.98);opacity:.85}
  .save-btn:disabled{opacity:.5}

  .up-scroll{flex:1;overflow-y:auto;padding:11px 12px 14px;display:flex;flex-direction:column;gap:10px}
  .up-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
  .up-head{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 7px;border-bottom:1px solid var(--border)}
  .up-day{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
  .up-date{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:1px}
  .up-pill{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--accent-soft);color:var(--accent)}
  .up-body{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
  .up-goal{font-size:14px;font-weight:700;color:var(--text);white-space:pre-wrap;word-break:break-word}
  .up-meta{display:flex;gap:7px;flex-wrap:wrap}
  .chip{background:var(--locked);border:1px solid var(--border);border-radius:7px;padding:5px 9px}
  .chip-lbl{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}
  .chip-val{font-size:12px;font-weight:600;color:var(--text);margin-top:1px}
  .up-int{font-size:11px;color:var(--t2);line-height:1.5;border-left:2.5px solid var(--border);padding-left:8px;white-space:pre-wrap;word-break:break-word}
  .no-data{text-align:center;padding:30px 20px;color:var(--t3);font-size:14px;line-height:1.6}

  .analysis-scroll{flex:1;overflow-y:auto;padding:12px 12px 24px;display:flex;flex-direction:column;gap:14px}
  .sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#374151;display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
  .sec-sub{font-size:9px;font-weight:500;color:var(--t3);letter-spacing:.03em;text-transform:none}
  .chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;flex-shrink:0}
  .chart-wrap{position:relative;height:155px}

  .pb-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0}
  .pb-table{width:100%;border-collapse:collapse}
  .pb-table th{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:8px 10px 6px;text-align:center;background:var(--locked);border-bottom:1px solid var(--border)}
  .pb-table th:first-child{text-align:left}
  .pb-table td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border)}
  .pb-table tr:last-child td{border-bottom:none}
  .pb-table td:first-child{font-size:11px;font-weight:600;color:#374151;text-align:left}
  .pb-num{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);display:block}
  .pb-dash{font-family:var(--mono);font-size:16px;color:var(--t3)}

  .heatmap-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;flex-shrink:0}
  .hm-legend{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:9px;color:var(--t2)}
  .hm-cell{width:10px;height:10px;border-radius:2px;flex-shrink:0}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:#18181b;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:999}
  .toast.error{background:#dc2626}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .state{height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:40px}
  .state-title{font-size:18px;font-weight:600}
  .state-msg{font-size:14px;color:var(--t2);line-height:1.5}
  .dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin:0 3px;animation:bounce 1.2s infinite ease-in-out}
  .dots span:nth-child(2){animation-delay:.2s}
  .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
