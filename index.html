<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyYB5tIIt046ejx-7AX804Zdox2uN2aJqvnboPIFMB5RWgAMJag7pZL-0h6lJkpLe9oOg/exec";

// 1. Security Check: Get or prompt for password
let apiToken = localStorage.getItem('wb_token');
if (!apiToken) {
  apiToken = prompt("Enter your Wattbike App passcode:");
  if (apiToken) {
    localStorage.setItem('wb_token', apiToken);
  } else {
    alert("Passcode required to sync data.");
  }
}

// Append token to the URL for all requests
const AUTH_URL = API_URL + "?token=" + encodeURIComponent(apiToken);

var currentRow = null;
var currentPage = 1;
var offlineQueue = JSON.parse(localStorage.getItem('wb_syncQueue') || '[]');

window.addEventListener('load', function() {
  registerServiceWorker();
  
  // Instantly load cached UI
  const cachedData = localStorage.getItem('wb_data');
  if (cachedData) {
    renderAll(JSON.parse(cachedData));
  } else {
    var el = document.getElementById('analysisContent');
    if(el) el.innerHTML = '<div class="no-data">Syncing initial data...</div>';
  }

  // Fetch fresh data in background if online
  if (navigator.onLine && apiToken) {
    syncApp();
  }
});

window.addEventListener('online', syncApp);

async function syncApp() {
  // Push saved workouts first
  if (offlineQueue.length > 0) {
    try {
      const res = await fetch(AUTH_URL, {
        method: 'POST',
        body: JSON.stringify(offlineQueue)
      });
      const result = await res.json();
      if (result.success) {
        offlineQueue = [];
        localStorage.setItem('wb_syncQueue', '[]');
        showToast('Offline saves synced ✓', false);
      } else if (result.error === "Access Denied") {
         handleAuthError();
         return;
      }
    } catch(e) {
      console.log('Failed to push sync queue');
    }
  }

  // Pull latest data
  try {
    const res = await fetch(AUTH_URL);
    const data = await res.json();
    
    if (data.error === "Access Denied") {
      handleAuthError();
      return;
    }

    localStorage.setItem('wb_data', JSON.stringify(data));
    renderAll(data);
  } catch(e) {
    console.log('Offline mode active');
  }
}

function handleAuthError() {
  alert("Incorrect passcode. Please refresh and try again.");
  localStorage.removeItem('wb_token');
  location.reload();
}

function renderAll(data) {
  if(data.today) handleToday(data.today);
  if(data.upcoming) handleUpcoming(data.upcoming);
  if(data.analytics) renderAnalytics(data.analytics);
}

function saveWorkout() {
  if (!currentRow) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  
  const workoutData = {
    rowNum: currentRow,
    goal: document.getElementById('goalInput').value,
    duration: document.getElementById('durationInput').value,
    intensity: document.getElementById('intensityInput').value,
    hrCap: document.getElementById('hrCapInput').value,
    notes: document.getElementById('notesInput').value
  };

  // Add to local offline queue
  offlineQueue.push(workoutData);
  localStorage.setItem('wb_syncQueue', JSON.stringify(offlineQueue));
  
  btn.disabled = false; 
  btn.textContent = 'Save Changes';
  showToast('Saved locally. Will sync when online.', false);

  if (navigator.onLine) syncApp();
}

function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(function() { console.log('SW registered!'); })
      .catch(function(err) { console.log('SW registration failed', err); });
  }
}

function switchPage(n) {
  currentPage = n;
  document.getElementById('slider').className = 'pages-slider p' + n;
  [1,2,3].forEach(function(i) {
    document.getElementById('tab'+i).className = 'tab-btn' + (i===n?' active':'');
  });
}

function handleToday(data) {
  var loadScreen = document.getElementById('loadingScreen');
  if(loadScreen) loadScreen.style.display = 'none';
  
  if (data.error) {
    var errorScreen = document.getElementById('errorScreen');
    if(errorScreen) errorScreen.style.display = 'flex';
    var errorMsg = document.getElementById('errorMsg');
    if(errorMsg) errorMsg.textContent = data.error;
    return;
  }
  
  currentRow = data.rowNum;
  document.getElementById('dayName').textContent    = data.dayOfWeek.toUpperCase();
  document.getElementById('dateDisplay').textContent = data.date;
  document.getElementById('goalInput').value         = data.goal;
  document.getElementById('durationInput').value     = data.duration;
  document.getElementById('hrCapInput').value        = data.hrCap;
  document.getElementById('intensityInput').value    = data.intensity;
  document.getElementById('notesInput').value        = data.notes;
  
  setMetric('mWatts', data.avgWatts);
  setMetric('mHR',    data.avgHR);
  setMetric('mRPM',   data.avgRPM);
  setMetric('mKJ',    data.workKJ);

  document.getElementById('appShell').style.display = 'flex';
}

function setMetric(id, val) {
  var el = document.getElementById(id);
  if(!el) return;
  if (val === '' || val === null || val === undefined) {
    el.innerHTML = '<span class="mval empty">—</span>';
  } else {
    el.textContent = val;
  }
}

function handleUpcoming(result) {
  var list = document.getElementById('upcomingList');
  if (!result.days || result.days.length === 0) {
    list.innerHTML = '<div class="no-data">No upcoming rides found.</div>';
    return;
  }
  list.innerHTML = result.days.map(function(day) {
    var labels = {1:'Tomorrow',2:'In 2 days',3:'In 3 days'};
    var pill   = labels[day.daysAway] || 'In '+day.daysAway+' days';
    return '<div class="up-card">'+
      '<div class="up-head">'+
        '<div><div class="up-day">'+esc(day.dayOfWeek)+'</div><div class="up-date">'+esc(day.date)+'</div></div>'+
        '<div class="up-pill">'+pill+'</div>'+
      '</div>'+
      '<div class="up-body">'+
        '<div class="up-goal">'+(day.goal?esc(day.goal):'<span style="color:var(--t3);font-weight:400">No goal set</span>')+'</div>'+
        '<div class="up-meta">'+chipHtml('Duration',day.duration)+(day.hrCap?chipHtml('HR Cap',day.hrCap):'')+
        (day.avgWatts?chipHtml('Avg W',day.avgWatts):'')+'</div>'+
        (day.intensity?'<div class="up-int">'+esc(day.intensity)+'</div>':'')+
      '</div></div>';
  }).join('');
}

function chipHtml(lbl,val) {
  return '<div class="chip"><div class="chip-lbl">'+lbl+'</div><div class="chip-val">'+esc(String(val||'—'))+'</div></div>';
}

function renderAnalytics(result) {
  var content = document.getElementById('analysisContent');
  if (!result || result.error) {
    content.innerHTML = '<div class="no-data">' + (result ? result.error : 'No response from server.') + '</div>';
    return;
  }
  if (!result.sessions || result.sessions.length < 2) {
    content.innerHTML = '<div class="no-data">Not enough session data yet.<br>Keep riding — trends appear after a few weeks.</div>';
    return;
  }

  var sessions = result.sessions;
  
  sessions.forEach(function(s) {
    if (!s.durationMins && s.workKJ && s.avgWatts) {
      s.durationMins = s.workKJ / (s.avgWatts * 0.06);
    }
  });

  var n = sessions.length;
  var now = Date.now();
  var ms90 = now - 90*864e5;
  var ms30 = now - 30*864e5;
  var ms7  = now - 7*864e5;

  document.getElementById('rideCount').textContent = n + ' rides';
  var first = new Date(sessions[0].dateMs);
  var last  = new Date(sessions[n-1].dateMs);
  document.getElementById('analysisRange').textContent = fmtShort(first) + ' – ' + fmtShort(last);

  content.innerHTML =
    '<div class="sec-title">Personal Bests</div>'+
    '<div class="pb-card"><table class="pb-table">'+
      '<tr><th></th><th>All time</th><th>90 days</th><th>30 days</th><th>7 days</th></tr>'+
      '<tr><td>Avg power (>30m)</td><td><span class="pb-num" id="pbAvgAll">—</span></td><td><span class="pb-num" id="pbAvg90">—</span></td><td><span class="pb-num" id="pbAvg30">—</span></td><td><span class="pb-num" id="pbAvg7">—</span></td></tr>'+
      '<tr><td>Max Weekly Load</td><td><span class="pb-num" id="pbKjAll">—</span></td><td><span class="pb-num" id="pbKj90">—</span></td><td><span class="pb-num" id="pbKj30">—</span></td><td><span class="pb-num" id="pbKj7">—</span></td></tr>'+
    '</table></div>'+
    
    '<div><div class="sec-title">Weekly Load <span class="sec-sub">duration (hrs) vs work done (kJ)</span></div>'+
    '<div class="chart-card"><div class="chart-wrap"><canvas id="volCanvas"></canvas></div></div></div>'+
    
    '<div><div class="sec-title">Monthly Load <span class="sec-sub">last 12 months (hrs vs kJ)</span></div>'+
    '<div class="chart-card"><div class="chart-wrap"><canvas id="monthlyCanvas"></canvas></div></div></div>'+
    
    '<div><div class="sec-title">Monthly Avg Power <span class="sec-sub">weighted avg (watts)</span></div>'+
    '<div class="chart-card"><div class="chart-wrap"><canvas id="monthlyPwrCanvas"></canvas></div></div></div>'+
    
    '<div><div class="sec-title">Ride Consistency <span class="sec-sub">work done (kJ) last 26 weeks</span></div>'+
    '<div class="heatmap-card" id="heatmap"></div></div>';

  // PB filter - Avg Power for rides strictly > 30 mins
  var avgSessions  = sessions.filter(function(s){return s.avgWatts>0 && s.durationMins > 30});
  setPB('pbAvgAll',  maxOf(avgSessions,'avgWatts'),'w');
  setPB('pbAvg90',   maxOf(avgSessions.filter(function(s){return s.dateMs>=ms90}),'avgWatts'),'w');
  setPB('pbAvg30',   maxOf(avgSessions.filter(function(s){return s.dateMs>=ms30}),'avgWatts'),'w');
  setPB('pbAvg7',    maxOf(avgSessions.filter(function(s){return s.dateMs>=ms7}), 'avgWatts'),'w');

  // PB filter - Max Weekly Load
  var weekMapPB = {};
  sessions.forEach(function(s){
    var mon = getMondayMs(s.dateMs);
    if(!weekMapPB[mon]) weekMapPB[mon] = {ms: mon, kj: 0};
    weekMapPB[mon].kj += s.workKJ || 0;
  });
  var pbWeeks = Object.values(weekMapPB);
  
  // Historical PBs use max calendar week load
  setPB('pbKjAll', maxOf(pbWeeks, 'kj'), ' kJ');
  setPB('pbKj90',  maxOf(pbWeeks.filter(function(w){return w.ms>=ms90}), 'kj'), ' kJ');
  setPB('pbKj30',  maxOf(pbWeeks.filter(function(w){return w.ms>=ms30}), 'kj'), ' kJ');
  
  // 7-day PB uses a rolling 7-day sum
  var rolling7DayKj = sessions.filter(function(s){return s.dateMs >= ms7}).reduce(function(acc, s){return acc + (s.workKJ || 0);}, 0);
  setPB('pbKj7', rolling7DayKj, ' kJ');

  // Weekly Load Chart
  var weekMap={};
  sessions.forEach(function(s){
    var mon=getMondayMs(s.dateMs);
    if(!weekMap[mon])weekMap[mon]={ms:mon,mins:0,kj:0};
    weekMap[mon].mins+=s.durationMins||0;
    weekMap[mon].kj+=s.workKJ||0;
  });
  var weeks=Object.values(weekMap).sort(function(a,b){return a.ms-b.ms}).slice(-26);
  
  new Chart(document.getElementById('volCanvas'),{
    type:'bar',
    data:{
      labels:weeks.map(function(w){var d=new Date(w.ms);return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}),
      datasets:[
        {
          label: 'Duration (hrs)',
          data: weeks.map(function(w){return +(w.mins / 60).toFixed(1)}),
          backgroundColor: 'rgba(37,99,235,.2)',
          type: 'bar',
          borderRadius: 3,
          yAxisID: 'y'
        },
        {
          label: 'Work (kJ)',
          data: weeks.map(function(w){return Math.round(w.kj)}),
          type: 'line',
          borderColor: '#8b5cf6',
          borderWidth: 2,
          pointRadius: 2,
          yAxisID: 'y1'
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction: { mode: 'index', intersect: false },
      plugins:{ legend:{display:false} },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8},color:'#9ca3af',maxRotation:45,maxTicksLimit:10}},
        y:{type:'linear',display:true,position:'left',beginAtZero:true,grid:{color:'#f3f4f6'},ticks:{font:{size:9},color:'#9ca3af'}},
        y1:{type:'linear',display:true,position:'right',beginAtZero:true,grid:{drawOnChartArea:false},ticks:{font:{size:9},color:'#8b5cf6'}}
      }
    }
  });

  // Monthly Load & Power Data Processing
  var monthMap = {};
  var todayMonth = new Date(now);
  todayMonth.setDate(1); 
  todayMonth.setHours(0,0,0,0);

  for (var i = 11; i >= 0; i--) {
    var mDate = new Date(todayMonth);
    mDate.setMonth(todayMonth.getMonth() - i);
    var k = mDate.getFullYear() + '-' + pad2(mDate.getMonth() + 1);
    monthMap[k] = { 
      ms: mDate.getTime(), 
      mins: 0, 
      kj: 0, 
      label: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mDate.getMonth()] + ' ' + String(mDate.getFullYear()).slice(-2) 
    };
  }

  sessions.forEach(function(s) {
    var d = new Date(s.dateMs);
    var k = d.getFullYear() + '-' + pad2(d.getMonth() + 1);
    if (monthMap[k]) {
      monthMap[k].mins += s.durationMins || 0;
      monthMap[k].kj += s.workKJ || 0;
    }
  });

  var months = Object.values(monthMap).sort(function(a,b) { return a.ms - b.ms; });

  // Monthly Load Chart
  new Chart(document.getElementById('monthlyCanvas'),{
    type:'bar',
    data:{
      labels: months.map(function(m) { return m.label; }),
      datasets:[
        {
          label: 'Duration (hrs)',
          data: months.map(function(m){return +(m.mins / 60).toFixed(1)}),
          backgroundColor: 'rgba(22,163,74,.2)', 
          type: 'bar',
          borderRadius: 3,
          yAxisID: 'y'
        },
        {
          label: 'Work (kJ)',
          data: months.map(function(m){return Math.round(m.kj)}),
          type: 'line',
          borderColor: '#16a34a', 
          borderWidth: 2,
          pointRadius: 2,
          yAxisID: 'y1'
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction: { mode: 'index', intersect: false },
      plugins:{ legend:{display:false} },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8},color:'#9ca3af'}},
        y:{type:'linear',display:true,position:'left',beginAtZero:true,grid:{color:'#f3f4f6'},ticks:{font:{size:9},color:'#9ca3af'}},
        y1:{type:'linear',display:true,position:'right',beginAtZero:true,grid:{drawOnChartArea:false},ticks:{font:{size:9},color:'#16a34a'}}
      }
    }
  });

  // Monthly Average Power Trend
  new Chart(document.getElementById('monthlyPwrCanvas'),{
    type:'line',
    data:{
      labels: months.map(function(m) { return m.label; }),
      datasets:[
        {
          label: 'Avg Power (W)',
          data: months.map(function(m) { 
            return m.mins > 0 ? Math.round((m.kj * 1000) / (m.mins * 60)) : null; 
          }),
          borderColor: '#ea580c',
          backgroundColor: 'rgba(234,88,12,0.1)',
          borderWidth: 2,
          pointRadius: 3,
          fill: true
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction: { mode: 'index', intersect: false },
      plugins:{ legend:{display:false} },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:8},color:'#9ca3af'}},
        y:{type:'linear',display:true,position:'left',grid:{color:'#f3f4f6'},ticks:{font:{size:9},color:'#9ca3af'}}
      }
    }
  });

  renderHeatmap(sessions);
}

function renderHeatmap(sessions) {
  var dateMap={};
  sessions.forEach(function(s){
    var d=new Date(s.dateMs);
    var k=d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
    dateMap[k]=(dateMap[k]||0)+(s.workKJ||0);
  });
  
  var today=new Date(); today.setHours(12,0,0,0);
  var dow=today.getDay();
  var curMon=new Date(today); curMon.setDate(today.getDate()-(dow===0?6:dow-1)); curMon.setHours(0,0,0,0);
  var startMon=new Date(curMon); startMon.setDate(startMon.getDate()-25*7);
  var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var ptr=new Date(startMon); var weeks=[]; var lastM=-1;
  
  for(var w=0;w<26;w++){
    var wk={showMonth:false,month:'',days:[]};
    for(var d=0;d<7;d++){
      var k=ptr.getFullYear()+'-'+pad2(ptr.getMonth()+1)+'-'+pad2(ptr.getDate());
      wk.days.push({kj:dateMap[k]||0, future:ptr>today});
      if(d===0){var m=ptr.getMonth();if(m!==lastM){wk.showMonth=true;wk.month=MONTHS[m];lastM=m;}}
      ptr.setDate(ptr.getDate()+1);
    }
    weeks.push(wk);
  }
  
  var DAYS=['M','T','W','T','F','S','S'];
  var html='<div style="overflow-x:auto"><div style="display:inline-flex;gap:2px;min-width:max-content">';
  html+='<div style="display:flex;flex-direction:column;gap:2px;padding-top:16px">';
  DAYS.forEach(function(d){html+='<div style="width:10px;height:10px;font-size:7px;color:#9ca3af;line-height:10px">'+d+'</div>';});
  html+='</div>';
  
  weeks.forEach(function(wk){
    html+='<div style="display:flex;flex-direction:column;gap:2px">';
    html+='<div style="height:14px;font-size:7px;color:#9ca3af;line-height:14px">'+(wk.showMonth?wk.month:'')+'</div>';
    wk.days.forEach(function(day){
      var bg;
      if(day.future) bg='#f9fafb';
      else if(day.kj === 0) bg='#e5e7eb';
      else if(day.kj < 200) bg='#c4b5fd'; 
      else if(day.kj < 400) bg='#8b5cf6'; 
      else if(day.kj < 600) bg='#6d28d9'; 
      else bg='#4c1d95';                  
      
      html+='<div style="width:10px;height:10px;border-radius:2px;background:'+bg+'" title="'+Math.round(day.kj)+' kJ"></div>';
    });
    html+='</div>';
  });
  html+='</div></div>';
  
  html+='<div class="hm-legend" style="justify-content:space-between; width:100%; max-width:350px; margin:14px auto 0;">'+
    '<div style="display:flex;align-items:center;gap:4px"><div class="hm-cell" style="background:#e5e7eb"></div><span>0</span></div>'+
    '<div style="display:flex;align-items:center;gap:4px"><div class="hm-cell" style="background:#c4b5fd"></div><span>&lt;200</span></div>'+
    '<div style="display:flex;align-items:center;gap:4px"><div class="hm-cell" style="background:#8b5cf6"></div><span>200-399</span></div>'+
    '<div style="display:flex;align-items:center;gap:4px"><div class="hm-cell" style="background:#6d28d9"></div><span>400-599</span></div>'+
    '<div style="display:flex;align-items:center;gap:4px"><div class="hm-cell" style="background:#4c1d95"></div><span>600+ kJ</span></div>'+
    '</div>';
    
  document.getElementById('heatmap').innerHTML=html;
}

function getMondayMs(ms) {
  var d=new Date(ms); d.setHours(0,0,0,0);
  var day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1));
  return d.getTime();
}
function maxOf(arr,key) {
  if(!arr.length) return null;
  return Math.max.apply(null,arr.map(function(s){return s[key]||0}));
}
function setPB(id,val,unit) {
  var el=document.getElementById(id); if(!el) return;
  el.textContent = (val&&isFinite(val)&&val>0) ? Math.round(val)+unit : '—';
}
function fmtShort(d) {
  return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getFullYear();
}
function pad2(n){return String(n).padStart(2,'0')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

var _tt;
function showToast(msg,isError){
  var t=document.getElementById('toast');
  if(!t) return;
  t.textContent=msg; t.className='toast'+(isError?' error':'');
  void t.offsetWidth; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(function(){t.classList.remove('show')},2500);
}
</script>
